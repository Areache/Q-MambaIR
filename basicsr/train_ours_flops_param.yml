# general settings for image SR training
name: Ablation_sdlq
model_type: MambaIRModel
scale: 2
num_gpu: 2
manual_seed: 10

# dataset and data loader settings
datasets:
  train:
    task: SR
    name: DF2K
    type: PairedImageDataset
    dataroot_gt:
      - /leonardo_work/IscrB_FM-EEG24/ychen004/datasets/training/DF2K/HR
    dataroot_lq:
      - /leonardo_work/IscrB_FM-EEG24/ychen004/datasets/training/DF2K/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

    gt_size: 128
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4  # 32
    batch_size_per_gpu: 16 # 16
    dataset_enlarge_ratio: 100
    prefetch_mode: ~

  val:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /leonardo_work/IscrB_FM-EEG24/ychen004/datasets/test/SR/Urban100/HR
    dataroot_lq: /leonardo_work/IscrB_FM-EEG24/ychen004/datasets/test/SR/Urban100/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

# network structures
network_g:
  type: Quant_SDLQ_MambaIR
  upscale: 2
  in_chans: 3
  img_size: 64
  img_range: 1.
  d_state: 10
  depths: [6, 6, 6, 6]
  embed_dim: 60
  mlp_ratio: 1.2
  k_bits: 32
  upsampler: 'pixelshuffledirect'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: /leonardo_work/IscrB_FM-EEG24/ychen004/datasets/training/pretrained_models/lightSR2.pth
  strict_load_g: false
  resume_state: ~

# training settings
train:
  optim_g:
    type: Adam
    #lr: !!float 2e-4
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]
 
  scheduler:
    type: MultiStepLR
    milestones: [10000, 15000, 17500, 18750] # for 20k
    # [250000, 400000, 450000, 475000]
    #milestones: [5000, 10000, 15000, 20000，25000，30000，35000]
    gamma: 0.5

  total_iter: 20000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
# validation settings
val:
  val_freq: !!float 2e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true



# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 2e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500